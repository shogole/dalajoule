<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>fast chicken — spice mix label</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0e0d12;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 60px;
    padding: 80px;
    flex-wrap: wrap;
  }

  .label-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .caption {
    color: #c9a84c;
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 4px;
    opacity: 0.4;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="label-wrap">
  <div class="caption">front · 小袋ラベル · 80×120mm</div>

  <svg width="240" height="360" viewBox="0 0 240 360" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <defs>
      <filter id="wb" x="-5%" y="-5%" width="110%" height="110%">
        <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" seed="7" result="n"/>
        <feDisplacementMap in="SourceGraphic" in2="n" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>

    <!-- Gold background -->
    <rect width="240" height="360" fill="#c9a84c"/>

    <!-- outer border -->
    <rect x="10" y="10" width="220" height="340" fill="none" stroke="#2c1f4a" stroke-width="2" opacity="0.6"/>
    <!-- inner border -->
    <rect x="16" y="16" width="208" height="328" fill="none" stroke="#2c1f4a" stroke-width="0.5" opacity="0.3"/>

    <!-- top line -->
    <line x1="30" y1="58" x2="210" y2="58" stroke="#2c1f4a" stroke-width="0.6" opacity="0.4"/>

    <!-- logo image -->
    <image href="images/logo.jpeg" x="85" y="18" width="70" height="38" preserveAspectRatio="xMidYMid meet"/>

    <!-- spice burst -->
    <g transform="translate(120, 148)" filter="url(#wb)">
      <circle cx="0" cy="0" r="50" fill="none" stroke="#2c1f4a" stroke-width="1" opacity="0.3"/>
      <circle cx="0" cy="0" r="36" fill="none" stroke="#2c1f4a" stroke-width="0.6" opacity="0.25"/>
      <line x1="0" y1="-50" x2="0" y2="-62" stroke="#2c1f4a" stroke-width="1" opacity="0.5"/>
      <line x1="50" y1="0" x2="62" y2="0" stroke="#2c1f4a" stroke-width="1" opacity="0.5"/>
      <line x1="0" y1="50" x2="0" y2="62" stroke="#2c1f4a" stroke-width="1" opacity="0.5"/>
      <line x1="-50" y1="0" x2="-62" y2="0" stroke="#2c1f4a" stroke-width="1" opacity="0.5"/>
      <line x1="35" y1="-35" x2="44" y2="-44" stroke="#2c1f4a" stroke-width="0.7" opacity="0.4"/>
      <line x1="35" y1="35" x2="44" y2="44" stroke="#2c1f4a" stroke-width="0.7" opacity="0.4"/>
      <line x1="-35" y1="35" x2="-44" y2="44" stroke="#2c1f4a" stroke-width="0.7" opacity="0.4"/>
      <line x1="-35" y1="-35" x2="-44" y2="-44" stroke="#2c1f4a" stroke-width="0.7" opacity="0.4"/>
      <circle cx="0" cy="0" r="16" fill="#2c1f4a" opacity="0.1"/>
      <circle cx="0" cy="0" r="7" fill="#2c1f4a" opacity="0.2"/>
    </g>

    <!-- main title -->
    <text x="120" y="242"
          text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="38"
          font-style="italic"
          fill="#2c1f4a"
          letter-spacing="1">fast</text>

    <text x="120" y="270"
          text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="20"
          font-style="italic"
          fill="#2c1f4a"
          letter-spacing="4"
          opacity="0.8">chicken</text>

    <!-- divider -->
    <line x1="60" y1="284" x2="180" y2="284" stroke="#2c1f4a" stroke-width="0.6" opacity="0.35"/>

    <!-- sub -->
    <text x="120" y="302"
          text-anchor="middle"
          font-family="'Courier New', monospace"
          font-size="8"
          fill="#2c1f4a"
          letter-spacing="4"
          opacity="0.55">SPICE MIX</text>

    <!-- weight -->
    <text x="120" y="328"
          text-anchor="middle"
          font-family="'Courier New', monospace"
          font-size="8"
          fill="#2c1f4a"
          letter-spacing="3"
          opacity="0.4">25 g</text>

    <!-- bottom dots -->
    <text x="120" y="346"
          text-anchor="middle"
          font-family="'Courier New', monospace"
          font-size="7"
          fill="#2c1f4a"
          letter-spacing="6"
          opacity="0.3">· · · · ·</text>

  </svg>
</div>

</body>
</html>
